<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurum Wallet — Éxito</title>
  <meta name="description" content="Tx Success" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; height: 100%; position: relative; padding: 0 32px;
    }
    
    .success-icon {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, #22c55e, #10b981);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 16px 40px rgba(34, 197, 94, 0.4);
      animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .success-icon svg { width: 48px; height: 48px; stroke: white; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    
    @keyframes pop-in {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .success-title { font-size: 28px; font-weight: 800; color: var(--color-text-primary); margin-bottom: 12px; }
    .success-subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 40px; }
    
    .receipt-card {
      width: 100%;
      background: var(--color-card-solid); backdrop-filter: blur(12px);
      border: 1.5px solid var(--color-card-glass-border);
      border-radius: var(--radius-md); padding: 24px;
      margin-bottom: 40px;
    }
    .receipt-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; }
    .receipt-row:last-child { margin-bottom: 0; padding-top: 12px; border-top: 1px dashed var(--color-card-glass-border); }
    .receipt-label { color: var(--color-text-secondary); }
    .receipt-value { color: var(--color-text-primary); font-weight: 700; }
    
    .btn-home {
      background: var(--color-text-primary); color: white;
      text-decoration: none; font-size: 15px; font-weight: 700;
      padding: 18px 0; width: 100%; border-radius: 32px;
      transition: all 0.3s ease; box-shadow: 0 12px 24px rgba(26,26,46,0.15);
    }
    .btn-home:hover { transform: translateY(-3px); box-shadow: 0 16px 32px rgba(26,26,46,0.25); }

    /* Canvas Confetti Base */
    #confetti-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
  </style>
</head>
<body class="page-transition">

  <div class="screen">
    <!-- Ambient Blobs -->
    <div class="ambient-blob blob-1" style="background: #86efac; top: -50px; right: -50px;"></div>
    <div class="ambient-blob blob-3" style="background: #93c5fd; bottom: -50px; left: -50px;"></div>

    <div class="screen-content" style="padding: 0;">
      <canvas id="confetti-canvas"></canvas>

      <div class="success-screen">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        
        <h1 class="success-title">Pago Enviado</h1>
        <p class="success-subtitle">Tu transacción fue confirmada al instante.</p>
        
        <div class="receipt-card">
          <div class="receipt-row">
            <span class="receipt-label">Destino</span>
            <span class="receipt-value">Cafetería "El Gato"</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-label">Fecha</span>
            <span class="receipt-value">Hoy, 9:42 AM</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-label">Status</span>
            <span class="receipt-value" style="color: #22c55e;">Completado ✅</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-label">Monto Exacto</span>
            <span class="receipt-value">-2.450 ARS</span>
          </div>
        </div>

        <a href="index.html" class="btn-home">Volver al Dashboard</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    // Tirar confetti al cargar page
    window.onload = function() {
      var duration = 3000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        var particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);
    }
  </script>
</body>
</html>
