<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurum Wallet — Reward Interaction</title>
  <meta name="description" content="Aurum Wallet Cashback Loot Box - Claim your reward" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-transition">

  <div class="screen reward-screen">
    <div class="screen-content" style="padding-top: 50px;">

      <!-- Overlay glow -->
      <div class="reward-overlay"></div>

      <!-- Ambient Blobs - stronger for reward -->
      <div class="ambient-blob blob-1" style="opacity: 0.35;"></div>
      <div class="ambient-blob blob-2" style="opacity: 0.3;"></div>
      <div class="ambient-blob blob-3" style="opacity: 0.4; background: #c084fc;"></div>

      <!-- Floating particles -->
      <div class="particle particle-1"></div>
      <div class="particle particle-2"></div>
      <div class="particle particle-3"></div>
      <div class="particle particle-4"></div>
      <div class="particle particle-5"></div>
      <div class="particle particle-6"></div>



      <!-- Close Button -->
      <a class="reward-close" href="index.html">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </a>

      <!-- Reward Badges -->
      <div class="reward-badges">
        <div class="reward-badge">
          <div class="badge-icon">🔥</div>
          <span class="badge-label">Streak Points</span>
        </div>
        <div class="reward-badge">
          <div class="badge-icon">⛽</div>
          <span class="badge-label">Free Gas Ticket</span>
        </div>
        <div class="reward-badge">
          <div class="badge-icon">💎</div>
          <span class="badge-label">Token Shards</span>
        </div>
        <div class="reward-badge">
          <div class="badge-icon">🎯</div>
          <span class="badge-label">Bonus XP</span>
        </div>
      </div>

      <!-- Loot Box -->
      <div class="lootbox-section">
        <div class="lootbox-container">
          <img src="loot_box.png" alt="Cashback Loot Box" />
        </div>
      </div>

      <!-- Claim Button -->
      <button class="claim-btn" id="claim-btn">Claim Reward!</button>

    </div>
  </div>

  <script>
    // Claim button interaction
    const claimBtn = document.getElementById('claim-btn');
    claimBtn.addEventListener('click', () => {
      claimBtn.textContent = '🎉 Claimed!';
      claimBtn.style.background = 'linear-gradient(135deg, #8b5cf6, #6366f1, #4f46e5)';
      claimBtn.style.pointerEvents = 'none';

      // Burst particles
      for (let i = 0; i < 12; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.width = (4 + Math.random() * 8) + 'px';
        particle.style.height = particle.style.width;
        particle.style.borderRadius = '50%';
        particle.style.background = ['#f59e0b', '#8b5cf6', '#22c55e', '#ec4899', '#3b82f6'][Math.floor(Math.random() * 5)];
        particle.style.left = (claimBtn.getBoundingClientRect().left + claimBtn.clientWidth / 2) + 'px';
        particle.style.top = (claimBtn.getBoundingClientRect().top) + 'px';
        particle.style.zIndex = '999';
        particle.style.pointerEvents = 'none';
        document.body.appendChild(particle);

        const angle = (Math.PI * 2 / 12) * i;
        const distance = 60 + Math.random() * 100;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance - 40;

        particle.animate([
          { transform: 'translate(0, 0) scale(1)', opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
        ], { duration: 800, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)' });

        setTimeout(() => particle.remove(), 800);
      }
    });
  </script>

</body>
</html>
